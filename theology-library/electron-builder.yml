appId: com.sth.desktop
productName: Sovereign Theology Hub
directories:
  output: release
win:
  target:
    - target: nsis
      arch: [x64]
  icon: assets/icon.ico
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: Sovereign Theology Hub
files:
  - dist/**
  - dist-electron/**
  - server/**
  - package.json
  - node_modules/**
extraResources:
  - from: assets/
    to: assets/
  - from: server/db/schema.sql
    to: bootstrap/schema.sql
asarUnpack:
  - node_modules/better-sqlite3/**
  - node_modules/mysql2/**
